name: Daily Knee Shoulder Batch

on:
  workflow_dispatch:
  schedule:
    - cron: "30 8 * * 1-5"

permissions:
  contents: write

jobs:
  run-daily-batch:
    runs-on: ubuntu-latest

    env:
      KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
      KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
      KIS_BASE_URL: ${{ secrets.KIS_BASE_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify required secrets
        run: |
          test -n "$KIS_APP_KEY"
          test -n "$KIS_APP_SECRET"
          test -n "$KIS_BASE_URL"

      - name: Run daily batch
        run: python run_daily.py

      - name: Commit batch outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f data/raw data/patches data/signals data/validation
          if git diff --cached --quiet; then
            echo "No batch output changes to commit."
            exit 0
          fi
          git commit -m "Update daily batch outputs"
          git push
